<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>
<body id="body">
    <section>
        <div class="sec_1">Rock, Paper, Scissors game!</div>
        <div class="sec_15" id="sec_15">
            <p id="html_player_score"></p>
            <p id="html_cpu_score"></p>
        </div>
        <div class="sec_2" id="sec_2">Hey. Wanna play a game?</div>
        <div class="sec_3"><button class="btn_yes" id="btn_yes">Yes</button><button class="btn_no" id="btn_no">No</button></div>
        <div class="sec_4"><button class="rock" id="rock">Rock</button><button class="paper" id="paper">Paper<button class="scissors" id="scissors">Scissors</button></div>
    </section>
</body>
</html>
